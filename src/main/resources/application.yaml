telegram:
  python:
    server:
      url: http://localhost:8081
    timeout:
      connect: 50000
      read: 600000

server:
  port: 8080

spring:
  # Отключаем H2 (больше не нужен)
  h2:
    console:
      enabled: false  # <-- отключаем H2 консоль

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Moscow
    serialization:
      write-dates-as-timestamps: false

  # ============================================================
  # НОВАЯ КОНФИГУРАЦИЯ ДЛЯ POSTGRESQL
  # ============================================================
  datasource:
    url: jdbc:postgresql://localhost:5432/krrg
    driver-class-name: org.postgresql.Driver
    username: krrg
    password: H.hbr2123

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true  # <-- опционально, для отладки SQL
    properties:
      hibernate:
        format_sql: true  # <-- опционально, красивое форматирование SQL
        jdbc:
          lob:
            non_contextual_creation: true

  # ============================================================
  # ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ (опционально)
  # ============================================================
  sql:
    init:
      mode: always  # <-- выполняет schema.sql и data.sql при старте
      continue-on-error: false