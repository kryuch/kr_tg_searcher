<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 8px;
            padding: 12px 16px;
            color: #c53030;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        .logout-message {
            background: #f0fff4;
            border: 2px solid #68d391;
            border-radius: 8px;
            padding: 12px 16px;
            color: #276749;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .logout-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>🔐 Вход</h1>
        <p>Войдите в свой аккаунт</p>
    </div>

    <!-- Сообщение об ошибке -->
    <div id="errorMessage" class="error-message" th:if="${param.error}" th:classappend="show">
        ⚠️ Неверный логин или пароль. Попробуйте снова.
    </div>

    <!-- Сообщение о выходе -->
    <div id="logoutMessage" class="logout-message" th:if="${param.logout}" th:classappend="show">
        ✅ Вы успешно вышли из системы.
    </div>

    <!-- Форма входа -->
    <form th:action="@{/login/}" method="post">
        <!-- CSRF токен (обязательно для Spring Security) -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="username">Логин</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Введите ваш логин"
                    required
                    autofocus
            />
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Введите ваш пароль"
                    required
            />
        </div>

        <button type="submit" class="btn-submit">Войти</button>
    </form>

    <div class="footer">
        <p>Нет аккаунта? <a href="#">Свяжитесь с администратором</a></p>
    </div>
</div>

<script>
    // Автоматическое скрытие сообщений через 5 секунд
    document.addEventListener('DOMContentLoaded', function () {
        const errorMessage = document.getElementById('errorMessage');
        const logoutMessage = document.getElementById('logoutMessage');

        if (errorMessage.classList.contains('show')) {
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        if (logoutMessage.classList.contains('show')) {
            setTimeout(() => {
                logoutMessage.classList.remove('show');
            }, 5000);
        }
    });
</script>

</body>
</html>
