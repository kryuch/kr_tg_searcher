<div>
    <div class="tgformcontainer" th:insert="tg/add.html :: div">
    </div>
    <div class="authform">
        <table class="list">
            <tr>
                <td>
                    <label for="id">ID аккаунта</label>
                </td>
                <td>
                    <input type="text" id="id" placeholder="ID приложения" name="id" value="1" readonly>
                    <small style="color: #666;">ID аккаунта из списка ТГ-аккаунтов</small>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="code">Код</label>
                </td>
                <td>
                    <input type="text" id="code" placeholder="Введите код из Telegram">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="password">Пароль (2FA)</label>
                </td>
                <td>
                    <input type="password" id="password" placeholder="Пароль двухфакторной аутентификации (если есть)">
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button id="receiveCode" class="save" type="submit">Отправить код</button>
                    <button id="verifyCode" class="save" type="submit">Подтвердить код</button>
                </td>
            </tr>
        </table>

        <!-- Контейнер для сообщений -->
        <div id="authMessage" style="margin-top: 15px; padding: 10px; border-radius: 4px; display: none;"></div>
    </div>

    <script>
        $(document).ready(function() {

            // ============================================================
            // 0. ПОЛУЧАЕМ CSRF-ТОКЕН
            // ============================================================
            var csrfToken = $('meta[name="_csrf"]').attr('content');
            var csrfHeader = $('meta[name="_csrf_header"]').attr('content');

            // ============================================================
            // 1. ОТПРАВКА ЗАПРОСА НА ПОЛУЧЕНИЕ КОДА
            // ============================================================
            $("#receiveCode").click(function(e) {
                e.preventDefault();

                // Используем правильный ID
                var tgAccountId = $("#id").val().trim();  // <-- ИСПРАВЛЕНО НА #id

                if (!tgAccountId) {
                    showMessage('Укажите ID аккаунта', 'error');
                    return;
                }

                var $btn = $(this);
                $btn.prop('disabled', true).text('Отправка...');
                hideMessage();

                $.ajax({
                    url: '/tg/auth/' + tgAccountId + '/receive',
                    type: 'POST',
                    headers: csrfToken ? { [csrfHeader]: csrfToken } : {},
                    dataType: 'json',
                    success: function(response) {
                        showMessage('Код отправлен на ваш номер телефона! Проверьте Telegram.', 'success');
                        console.log('✅ Код отправлен:', response);
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = 'Ошибка при отправке кода: ';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMsg += xhr.responseJSON.message;
                        } else if (xhr.responseJSON && xhr.responseJSON.error) {
                            errorMsg += xhr.responseJSON.error;
                        } else {
                            errorMsg += error;
                        }
                        showMessage(errorMsg, 'error');
                        console.error('❌ Ошибка:', error);
                    },
                    complete: function() {
                        $btn.prop('disabled', false).text('Отправить код');
                    }
                });
            });

            // ============================================================
            // 2. ПОДТВЕРЖДЕНИЕ КОДА
            // ============================================================
            $("#verifyCode").click(function(e) {
                e.preventDefault();

                // Используем правильный ID
                var tgAccountId = $("#id").val().trim();  // <-- ИСПРАВЛЕНО НА #id
                var code = $("#code").val().trim();
                var password = $("#password").val().trim();

                if (!tgAccountId) {
                    showMessage('Укажите ID аккаунта', 'error');
                    return;
                }

                if (!code) {
                    showMessage('Введите код из Telegram', 'error');
                    return;
                }

                var $btn = $(this);
                $btn.prop('disabled', true).text('Проверка...');
                hideMessage();

                var requestData = {
                    tgAccountId: parseInt(tgAccountId),
                    code: code
                };

                if (password) {
                    requestData.password = password;
                }

                $.ajax({
                    url: '/tg/auth/verify',
                    type: 'POST',
                    contentType: 'application/json',
                    headers: csrfToken ? { [csrfHeader]: csrfToken } : {},
                    data: JSON.stringify(requestData),
                    dataType: 'json',
                    success: function(response) {
                        showMessage('✅ Аккаунт успешно авторизован!', 'success');
                        console.log('✅ Авторизация успешна:', response);

                        setTimeout(function() {
                            window.location.href = '/tg/list';
                        }, 2000);
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = 'Ошибка при проверке кода: ';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMsg += xhr.responseJSON.message;
                        } else if (xhr.responseJSON && xhr.responseJSON.error) {
                            errorMsg += xhr.responseJSON.error;
                        } else {
                            errorMsg += error;
                        }
                        showMessage(errorMsg, 'error');
                        console.error('❌ Ошибка:', error);
                    },
                    complete: function() {
                        $btn.prop('disabled', false).text('Подтвердить код');
                    }
                });
            });

            // ============================================================
            // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
            // ============================================================
            function showMessage(text, type) {
                var $msg = $('#authMessage');

                if (!$msg.length) {
                    console.error('❌ Элемент #authMessage не найден');
                    return;
                }

                $msg.text(text)
                    .removeClass('success error')
                    .addClass(type)
                    .css('display', 'block');

                if (type === 'success') {
                    $msg.css({
                        'background-color': '#d4edda',
                        'color': '#155724',
                        'border': '1px solid #c3e6cb'
                    });
                } else if (type === 'error') {
                    $msg.css({
                        'background-color': '#f8d7da',
                        'color': '#721c24',
                        'border': '1px solid #f5c6cb'
                    });
                }
            }

            function hideMessage() {
                var $msg = $('#authMessage');
                if ($msg.length) {
                    $msg.css('display', 'none').text('');
                }
            }

            $(document).on('click', '#authMessage', function() {
                hideMessage();
            });

        });
    </script>
</div>
