<div class="icontent">
    <table class="list onlychatheaders">
        <thead>
        <tr id="header">
            <th></th>
            <th id="title" class="table-alias">Логин</th>
            <th id="id" class="table-id">Id</th>
            <th id="name" class="table-name">Имя</th>
            <th id="avatar" class="table-avatar">Аватар</th>
            <th id="folders" class="table-folders">Папки</th>
            <th class="table-setting"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${items.empty}">
            <td colspan="7">Тут пусто</td>
        </tr>

        <th:block th:each="item, iter : ${items}">
            <tr th:attr="data-chat-id=${item.id}, data-chat-name=${item.name}"
                th:class="${'chatstatus' + (item.status != null ? item.status : 0)}">

                <td>
                    <input type="checkbox" name="check[]" th:attr="data-chat-id=${item.id}"/>
                </td>
                <td>
                    <span th:text="${item.username}">Username</span>
                </td>
                <td>
                    <span th:text="${item.id}">Id</span>
                </td>
                <td class="chattitle">
                    <a th:href="@{/chat/{id}(id=${item.id})}"
                       class="chat-preview-link"
                       th:data-chat-id="${item.id}"
                       th:data-chat-name="${item.name}"
                       th:text="${item.name}">
                        Заголовок
                    </a>
                </td>
                <td>
                    <div class="chat-avatar"
                         th:data-chat-id="${item.id}"
                         th:data-chat-name="${item.name}"
                         style="cursor: pointer; display: inline-block;">
                        <img th:if="${item.avatar != null}"
                             th:src="'data:image/jpeg;base64,' + ${item.avatar}"
                             style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <div th:unless="${item.avatar != null}"
                             style="width:40px; height:40px; border-radius:50%; background:#2b5278; display:inline-flex; align-items:center; justify-content:center;">
                            📷
                        </div>
                    </div>
                </td>
                <td th:class="${'foldertitle_' + (item.hasTargetFolder)}">
                    <span class="folderspan" th:text="${item.folderTitles}">Folders</span>
                </td>
                <td class="settingbuttons">
                    <a href="#" class="btn-restore btn-status" data-status="1">Отказ</a>
                    <a href="#" class="btn-send btn-status" data-status="2">--</a>
                    <a href="#" class="btn-remove btn-status" data-status="3">Не HR</a>

                    <a href="#" class="btn-add btn-folder" data-status="1">В папку</a>
                    <a href="#" class="btn-remove btn-folder" data-status="0">Из папки</a>
                </td>
            </tr>
            <tr class="chatpremessages">
                <td colspan="7">
                    <div class="chat-messages">
                        <th:block th:each="message, miter : ${item.messages}">
          <span th:class="${message.ownerFlag} ? 'messageflag_true message' : 'messageflag_false message'">
            <span th:id="'short-' + ${miter.index}" class="description-short"
                  th:text="${#strings.abbreviate(message.value, 32)}" onclick="showMessage(this, true)"></span>
            <span th:id="'long-' + ${miter.index}" class="description-long" onclick="showMessage(this, false)"
                  th:text="${message.value}"></span>
            <span class="dt" th:text="${#temporals.format(message.dateTime, 'dd.MM')}"></span>
        </span>
                        </th:block>
                    </div>
                </td>
            </tr>
        </th:block>
        </tbody>
    </table>

    <script th:inline="javascript">
        var targetFolder = /*[[${targetFolder}]]*/ 'Target';
    </script>

    <script>
        document.querySelectorAll('.btn-folder').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var row = this.closest('tr');
                var chatId = row.getAttribute('data-chat-id');
                var chatName = row.getAttribute('data-chat-name');
                var status = this.getAttribute('data-status');

                if (!chatId || !chatName) {
                    console.error('Не найдены data-chat-id или data-chat-name');
                    return;
                }

                var originalText = this.innerText;
                this.innerText = '...';

                const params = new URLSearchParams({
                    chatId: chatId,
                    name: chatName,
                    status: status
                });

                fetch('/chat/status/folder?' + params.toString(), {
                    method: 'POST'
                })
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function(success) {
                        if (success) {
                            var span = row.querySelector('.folderspan');
                            var td = span.parentElement;

                            // Используем переменную targetFolder из глобальной области
                            if (status == 1) {
                                td.className = 'foldertitle_true';
                                // Добавляем, если ещё нет
                                if (!span.textContent.includes(targetFolder)) {
                                    span.textContent = span.textContent
                                        ? span.textContent + ', ' + targetFolder
                                        : targetFolder;
                                }
                            } else {
                                td.className = 'foldertitle_false';
                                // Удаляем targetFolder
                                var folders = span.textContent.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s && s !== targetFolder; });
                                span.textContent = folders.join(', ');
                            }
                        } else {
                            alert('Ошибка при сохранении статуса папки');
                        }
                    })
                    .catch(function(error) {
                        console.error('Ошибка:', error);
                        alert('Ошибка при сохранении статуса папки');
                    })
                    .finally(function() {
                        btn.innerText = originalText;
                    });
            });
        });

        document.querySelectorAll('.btn-status').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var row = this.closest('tr');
                var chatId = row.getAttribute('data-chat-id');
                var chatName = row.getAttribute('data-chat-name');
                var status = this.getAttribute('data-status');

                if (!chatId || !chatName) {
                    console.error('Не найдены data-chat-id или data-chat-name');
                    return;
                }

                var originalText = this.innerText;
                this.innerText = '...';

                const params = new URLSearchParams({
                    chatId: chatId,
                    name: chatName,
                    status: status
                });

                fetch('/chat/status/update?' + params.toString(), {
                    method: 'POST'
                })
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function(success) {
                        if (success) {
                            row.className = 'chatstatus' + status;
                        } else {
                            alert('Ошибка при сохранении статуса');
                        }
                    })
                    .catch(function(error) {
                        console.error('Ошибка:', error);
                        alert('Ошибка при сохранении статуса');
                    })
                    .finally(function() {
                        btn.innerText = originalText;
                    });
            });
        });
    </script>
</div>
