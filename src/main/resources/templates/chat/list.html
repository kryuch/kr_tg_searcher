<div class="icontent">
    <table class="list">
        <thead>
        <tr id="header">
            <th></th>
            <th id="title" class="table-alias">Заголовок</th>
            <th id="technology" class="table-description">Аватар</th>
            <th class="table-setting"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${items.empty}">
            <td colspan="3">Тут пусто</td>
        </tr>

        <th:block th:each="item, iter : ${items}">
            <tr th:attr="data-chat-id=${item.id}, data-chat-name=${item.name}"
                th:class="${'chatstatus' + (item.status != null ? item.status : 0)}">
                <td><input type="checkbox" name="check[]" th:attr="data-chat-id=${item.id}"/></td>
                <td class="chattitle">
                    <a th:href="@{/chat/{id}(id=${item.id})}"
                       class="chat-preview-link"
                       th:data-chat-id="${item.id}"
                       th:data-chat-name="${item.name}"
                       th:text="${item.name}">
                        Заголовок
                    </a>
                    <br>
                    <span th:text="${item.id}">Id</span>
                    <span th:text="${item.username}">Username</span>
                </td>
                <td>
                    <table>
                        <tr>
                            <td>
                                <div class="chat-avatar"
                                     th:data-chat-id="${item.id}"
                                     th:data-chat-name="${item.name}"
                                     style="cursor: pointer; display: inline-block;">
                                    <img th:if="${item.avatar != null}"
                                         th:src="'data:image/jpeg;base64,' + ${item.avatar}"
                                         style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                    <div th:unless="${item.avatar != null}"
                                         style="width:40px; height:40px; border-radius:50%; background:#2b5278; display:inline-flex; align-items:center; justify-content:center;">
                                        📷
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div class="chat-messages">
                                    <th:block th:each="message, miter : ${item.messages}">
          <span th:class="${message.ownerFlag} ? 'messageflag_true message' : 'messageflag_false message'">
            <span th:id="'short-' + ${miter.index}" class="description-short"
                  th:text="${#strings.abbreviate(message.value, 32)}" onclick="showMessage(this, true)"></span>
            <span th:id="'long-' + ${miter.index}" class="description-long" onclick="showMessage(this, false)"
                  th:text="${message.value}"></span>
            <span class="dt" th:text="${#temporals.format(message.dateTime, 'dd.MM')}"></span>
        </span>
                                    </th:block>
                                </div>
                            </td>
                        </tr>
                    </table>
                </td>
                <td class="settingbuttons">
                    <a href="#" class="btn-restore btn-status" data-status="1">Отказ</a>
                    <a href="#" class="btn-send btn-status" data-status="2">-</a>
                    <a href="#" class="btn-remove btn-status" data-status="3">Не HR</a>
                </td>
            </tr>
        </th:block>
        </tbody>
    </table>
    <script>
        document.querySelectorAll('.btn-status').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var row = this.closest('tr');
                var chatId = row.getAttribute('data-chat-id');
                var chatName = row.getAttribute('data-chat-name');
                var status = this.getAttribute('data-status');

                if (!chatId || !chatName) {
                    console.error('Не найдены data-chat-id или data-chat-name');
                    return;
                }

                var originalText = this.innerText;
                this.innerText = '...';

                const params = new URLSearchParams({
                    chatId: chatId,
                    name: chatName,
                    status: status
                });

                fetch('/chat/status/update?' + params.toString(), {
                    method: 'POST'
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(success => {
                        if (success) {
                            row.className = 'chatstatus' + status;
                        } else {
                            alert('Ошибка при сохранении статуса');
                        }
                    })
                    .catch(error => {
                        console.error('Ошибка:', error);
                        alert('Ошибка при сохранении статуса');
                    })
                    .finally(() => {
                        btn.innerText = originalText;
                    });
            });
        });
    </script>
</div>
