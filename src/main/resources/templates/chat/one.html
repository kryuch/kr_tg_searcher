<div class="onepage">
    <table>
        <tr>
            <td class="sendmessage">
                <input type="text" id="message" name="message" th:value="${message}">
                <input type="hidden" id="back" name="back" th:value="${id}">
                <input type="submit" id="sendMessageBtn"/>
            </td>
            <td>
                <span>Новые ТГ</span>
                <table border="1">
                    <tr th:each="row, rowStat : ${#numbers.sequence(0, data.newTg.size() - 1, 2)}">
                        <td th:text="${data.newTg[row]}"></td>
                        <td th:if="${row + 1 < data.newTg.size()}" th:text="${data.newTg[row + 1]}"></td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>
                <div class="econtent" th:insert="chat/messages.html :: div"></div>
            </td>
            <td class="vacancycontainer" id="vacancyContainer" th:insert="chat/vacancies.html :: div">
            </td>
        </tr>
        <tr>
            <td class="settingbuttons" rowspan="2">
                <input type="text" id="term" name="term" class="1col active form-control"/>
                <input type="text" id="text" name="text" class="1col active form-control"/>
                <a class="btn-save" th:attr="data-chat-id=${id}" href="#">Разобрать</a>
            </td>
        </tr>
    </table>
    <script>
        document.getElementById('sendMessageBtn').addEventListener('click', function() {
            var message = document.getElementById('message').value.trim();
            var back = document.getElementById('back').value;

            if (!message) {
                alert('Введите текст сообщения');
                return;
            }

            if (!back) {
                alert('ID чата не найден');
                return;
            }

            var btn = this;
            var originalText = btn.innerText;
            btn.innerText = 'Отправка...';
            btn.disabled = true;

            fetch('/chat/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    back: parseInt(back),
                    chatIds: [],
                    message: message
                })
            })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        alert('Сообщение отправлено');
                        location.reload();
                    } else {
                        alert('Ошибка: ' + (result.error || 'Не удалось отправить сообщение'));
                    }
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    alert('Ошибка при отправке сообщения');
                })
                .finally(function() {
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
        });
    </script>
    <script>
        document.addEventListener('click', function (e) {
            var btn = e.target.closest('.btn-save');
            if (!btn) return;

            e.preventDefault();

            var chatId = btn.getAttribute('data-chat-id');
            if (!chatId) {
                console.error('chatId не найден');
                return;
            }

            // Получаем значение поля term
            var termInput = document.getElementById('term');
            var termValue = termInput ? termInput.value : '';

            var textInput = document.getElementById('text');
            var textValue = textInput ? textInput.value : '';

            if (!termValue.trim()) {
                console.warn('Поле term пустое');
                // Можно показать предупреждение пользователю
                // alert('Пожалуйста, заполните поле');
                // return; // если поле обязательно — раскомментировать
            }

            var container = document.getElementById('vacancyContainer');
            if (!container) {
                console.error('vacancyContainer не найден');
                return;
            }

            container.innerHTML = '<div style="padding: 10px; text-align: center;">Загрузка...</div>';

            // Отправляем POST-запрос с данными в теле
            fetch('/chat/status/' + chatId + '/vacancies/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'term=' + encodeURIComponent(termValue) + '&text=' + encodeURIComponent(textValue)
            })
                .then(response => response.text())
                .then(html => {
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    container.innerHTML = '<div style="padding: 10px; color: red;">Ошибка загрузки</div>';
                });
        });
    </script>
</div>
