<div th:if="${messages != null}" style="background: #0f0f0f; color: #e9edf0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-width: 400px; max-width: 600px;">
    <div style="background: #1f2c33; padding: 12px 16px; border-bottom: 1px solid #2b2b2b;">
        <strong th:text="${chatName}">Чат</strong>
        <span style="float: right; color: #839aa9;" th:text="${messages.size} + ' сообщений'"></span>
    </div>
    <div id="messagesContainer" style="max-height: 500px; overflow-y: auto; padding: 16px;">
        <div class="username"><strong th:text="${messages.chatInfo.name}">username</strong></div>
        <th:block th:each="entry : ${messages.sortedGroupedValues}">
        <!-- Заголовок даты -->
            <div style="text-align: center; margin: 16px 0 8px 0;">
                <span style="background: #2b2b2b; padding: 4px 12px; border-radius: 12px; font-size: 12px; color: #839aa9;">
                    <th:block th:switch="${true}">
                        <th:block th:case="${entry.key.equals(#temporals.createToday())}">Сегодня</th:block>
                        <th:block th:case="${entry.key.equals(#temporals.createToday().minusDays(1))}">Вчера</th:block>
                        <th:block th:case="*"><span th:text="${#temporals.format(entry.key, 'dd MMMM yyyy')}"></span></th:block>
                    </th:block>
                </span>
            </div>
            <!-- Сообщения за эту дату -->
            <div th:each="msg : ${entry.value}" style="display: flex; justify-content: ${msg.ownerFlag} ? 'flex-end' : 'flex-start'; margin-bottom: 8px;">
                <div th:style="'background: ' + (${msg.ownerFlag} ? '#2b5278' : '#18232c') + '; padding: 8px 10px; border-radius: ' + (${msg.ownerFlag} ? '14px 14px 4px 14px' : '14px 14px 14px 4px') + '; max-width: 70%;'">
                    <div style="font-size: 14px; line-height: 1.4;" th:text="${msg.value}">Текст</div>
                    <div style="font-size: 10px; color: #839aa9; text-align: right; margin-top: 4px;" th:text="${#temporals.format(msg.dateTime, 'HH:mm')}">00:00</div>
                </div>
            </div>
        </th:block>
        <div th:if="${#lists.isEmpty(messages.values)}" style="text-align: center; padding: 40px; color: #839aa9;">
            Нет сообщений
        </div>
    </div>
    <script>
        var container = document.getElementById('messagesContainer');
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
    </script>
</div>
